<!-- 
  ==========================================================================
  VIDEO RECORDING & OPTIONS SETTINGS WIDGET — BLUEPRINT MARKUP
  ==========================================================================
  Description: A responsive glassmorphic subpanel displaying recording metrics, 
  resolution constraints, format outputs, and pipeline selections.
  Storable: Embed directly in a side drawer, settings container, or bottom toolbar.
  Dependencies: Tailwind CSS utilities are applied by default.
-->
<div class="w-full max-w-7xl mx-auto p-4 bg-zinc-900/90 border border-white/10 rounded-xl shadow-xl backdrop-blur-md">
  
  <div class="flex items-center justify-between w-full flex-wrap gap-4 md:flex-nowrap">
    
    <!-- Action Segment & Trigger Trigger -->
    <div class="flex items-center gap-3 shrink-0">
      <!-- 
        Target Segment: Primary trigger initiating/stopping recording pipelines.
        ID: #btn-video (Managed dynamically in RecordingEngine events)
      -->
      <button id="btn-video" class="h-9 px-5 text-xs font-mono font-bold uppercase tracking-wider rounded-lg border border-red-500/30 bg-red-500/5 text-red-400 hover:bg-red-500/10 active:scale-95 transition-all cursor-pointer whitespace-nowrap">
        ⏺ Record Export
      </button>
    </div>

    <!-- Separator Line (Hidden on wrap displays) -->
    <div class="hidden md:block w-px h-8 bg-white/10 self-stretch shrink-0"></div>
    
    <!-- Dropdowns Form Fields Layout Grid -->
    <div class="flex flex-wrap items-center gap-4 text-left">
      
      <!-- Component 1: Assembly Pipeline Type -->
      <div class="flex flex-col">
        <!-- Style Key: '.label-micro' (Provides tiny uppercase sub-label tracking) -->
        <span class="text-[8px] font-mono font-black text-white/50 mb-1 tracking-widest uppercase select-none">
          Pipeline
        </span>
        <!-- ID: #sel-pipeline (Configures whether we render WebAssembly video directly, zip frames, etc.) -->
        <select id="sel-pipeline" class="h-[22px] py-0 text-[10px] w-28 bg-white/5 border border-white/15 hover:border-white/30 text-white rounded px-1.5 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 cursor-pointer transition-all">
          <option value="ffmpeg" selected>FFmpeg</option>
          <option value="opfs">OPFS Frames</option>
          <option value="zip">Disk (ZIP)</option>
          <option value="local">📁 Local Folder</option>
        </select>
      </div>

      <!-- Component 2: Capture Operations Action -->
      <div class="flex flex-col">
        <span class="text-[8px] font-mono font-black text-white/50 mb-1 tracking-widest uppercase select-none">
          Action
        </span>
        <!-- ID: #sel-action (Toggles between live recording or manual browser chunk-assembly) -->
        <select id="sel-action" class="h-[22px] py-0 text-[10px] w-24 bg-white/5 border border-white/15 hover:border-white/30 text-white rounded px-1.5 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 cursor-pointer transition-all">
          <option value="record" selected>⏺ Record</option>
          <option value="assemble">🛠 Assemble</option>
        </select>
      </div>

      <!-- Component 3: Output Bounds Frame Resolution -->
      <div class="flex flex-col">
        <span class="text-[8px] font-mono font-black text-white/50 mb-1 tracking-widest uppercase select-none">
          Resolution
        </span>
        <!-- ID: #sel-res (Aligns canvas sizes synchronously on initialization) -->
        <select id="sel-res" class="h-[22px] py-0 text-[10px] w-26 bg-white/5 border border-white/15 hover:border-white/30 text-white rounded px-1.5 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 cursor-pointer transition-all">
          <option value="640x360">360p</option>
          <option value="854x480">480p</option>
          <option value="1280x720" selected>720p</option>
          <option value="1920x1080">1080p</option>
          <option value="2560x1440">1440p</option>
          <option value="3840x2160">4K</option>
        </select>
      </div>

      <!-- Component 4: Dual Output Frame Format & Target Speed -->
      <div class="flex flex-col">
        <span class="text-[8px] font-mono font-black text-white/50 mb-1 tracking-widest uppercase select-none">
          Format & FPS
        </span>
        <div class="flex gap-1.5">
          <!-- ID: #sel-format (Selects system encoding profile: MP4 has standard support, WEBM offers rapid fallbacks) -->
          <select id="sel-format" class="h-[22px] py-0 text-[10px] w-[50px] bg-white/5 border border-white/15 hover:border-white/30 text-white rounded px-1 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 cursor-pointer transition-all">
            <option value="mp4" selected>MP4</option>
            <option value="webm">WEBM</option>
          </select>
          <!-- ID: #sel-fps (Determines relative output timing during video composition) -->
          <select id="sel-fps" class="h-[22px] py-0 text-[10px] w-[45px] bg-white/5 border border-white/15 hover:border-white/30 text-white rounded px-1 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 cursor-pointer transition-all">
            <option value="12">12</option>
            <option value="24">24</option>
            <option value="30" selected>30</option>
            <option value="60">60</option>
            <option value="90">90</option>
            <option value="120">120</option>
          </select>
        </div>
      </div>

      <!-- Component 5: Compression CRF Quality Presets -->
      <div class="flex flex-col">
        <span class="text-[8px] font-mono font-black text-white/50 mb-1 tracking-widest uppercase select-none">
          Quality / CRF
        </span>
        <!-- ID: #sel-crf (Configures FFmpeg compression ratio. Lower numbers indicate lossless or high weight) -->
        <select id="sel-crf" class="h-[22px] py-0 text-[10px] w-28 bg-white/5 border border-white/15 hover:border-white/30 text-[#00ffcc] font-mono font-bold rounded px-1.5 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 cursor-pointer transition-all">
          <option value="0">0 (Lossless)</option>
          <option value="5" selected>5 (Ultra Quality)</option>
          <option value="12">12 (High Quality)</option>
          <option value="18">18 (Default)</option>
          <option value="23">23 (Medium)</option>
          <option value="28">28 (Low Space)</option>
          <option value="35">35 (Lowest Quality)</option>
        </select>
      </div>

      <!-- Component 6: Responsive Dynamic Screen Trimming -->
      <div class="flex flex-col" id="trim-selection-container">
        <span class="text-[8px] font-mono font-black text-white/50 mb-1 tracking-widest uppercase select-none">
          WebM Snug Trim
        </span>
        <!-- ID: #sel-trim (Defines margin crop thresholds to fit container limits during active processing) -->
        <select id="sel-trim" class="h-[22px] py-0 text-[10px] w-32 bg-white/5 border border-white/15 hover:border-white/30 text-white rounded px-1.5 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 cursor-pointer transition-all">
          <option value="none" selected>Letterbox (16:9)</option>
          <option value="subtle">Subtle Trim (20%)</option>
          <option value="snug">Snug Crop (33%)</option>
          <option value="max">Maximum (45%)</option>
        </select>
      </div>

    </div>

  </div>
</div>
